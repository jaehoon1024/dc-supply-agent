<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DC 물건 분석 에이전트 — LGU+ DBO 사업팀</title>
<style>
:root {
  --bg:#f1f5f9; --surf:#ffffff; --surf2:#f7f9fc; --surf3:#edf2f7;
  --border:#e2e8f0; --border2:#cbd5e1;
  --blue:#2563eb; --blue-lo:#eff6ff; --blue-mid:rgba(37,99,235,.12);
  --green:#16a34a; --green-lo:#f0fdf4;
  --red:#dc2626; --red-lo:#fef2f2;
  --amber:#d97706; --slate:#64748b; --slate2:#94a3b8; --slate3:#cbd5e1;
  --text:#1e293b; --text2:#475569;
  --font:'Noto Sans KR',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text);overflow:hidden;}

/* topbar — 에이전트와 동일 */
.topbar{height:46px;background:#0f172a;display:flex;align-items:center;padding:0 18px;gap:10px;border-bottom:1px solid #1e293b;flex-shrink:0;}
.tb-title{font-size:13.5px;font-weight:700;color:#f1f5f9;letter-spacing:-.01em;white-space:nowrap;}
.tb-badge{font-size:10px;font-weight:600;color:#60a5fa;background:rgba(37,99,235,.2);padding:2px 8px;border-radius:10px;border:1px solid rgba(37,99,235,.3);white-space:nowrap;}
.tb-spacer{flex:1;}
.tb-ver{font-size:10px;color:var(--slate2);font-family:var(--mono);}

/* layout */
.app{display:flex;flex-direction:column;height:100vh;}
.body-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px;overflow:auto;}

/* card */
.card{width:100%;max-width:440px;background:var(--surf);border:1px solid var(--border);border-radius:14px;box-shadow:0 4px 24px rgba(0,0,0,.08),0 1px 4px rgba(0,0,0,.04);overflow:hidden;animation:cardIn .35s cubic-bezier(.22,1,.36,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* card header */
.card-hd{background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%);padding:28px 32px 22px;border-bottom:1px solid rgba(255,255,255,.06);}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.logo-icon{width:36px;height:36px;background:linear-gradient(135deg,#2563eb,#0891b2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.logo-txt{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#94a3b8;font-family:var(--mono);}
.card-title{font-size:20px;font-weight:800;color:#f8fafc;letter-spacing:-.02em;line-height:1.25;margin-bottom:4px;}
.card-sub{font-size:11.5px;color:#64748b;font-family:var(--mono);}
.card-sub span{color:#38bdf8;font-weight:600;}

/* card body */
.card-bd{padding:24px 32px 26px;}
.info-banner{display:flex;align-items:center;gap:10px;background:var(--blue-lo);border:1px solid #bfdbfe;border-radius:8px;padding:10px 13px;margin-bottom:20px;font-size:11.5px;color:#1d4ed8;}
.field-label{font-size:10.5px;font-weight:700;color:var(--slate);letter-spacing:.08em;text-transform:uppercase;margin-bottom:7px;display:block;}

/* input */
.inp-wrap{position:relative;margin-bottom:14px;}
.inp-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--slate2);font-size:14px;pointer-events:none;}
.pw-inp{width:100%;height:40px;padding:0 40px 0 38px;border:1.5px solid var(--border2);border-radius:8px;background:var(--surf);color:var(--text);font-size:15px;font-family:var(--mono);letter-spacing:.18em;outline:none;transition:border-color .15s,box-shadow .15s;}
.pw-inp:focus{border-color:var(--blue);box-shadow:0 0 0 3px var(--blue-mid);}
.pw-inp.err{border-color:var(--red);box-shadow:0 0 0 3px rgba(220,38,38,.1);animation:shake .3s ease;}
.pw-inp::placeholder{color:var(--slate3);letter-spacing:.04em;font-size:12px;}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.toggle-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--slate2);cursor:pointer;font-size:14px;padding:3px;transition:color .15s;}
.toggle-btn:hover{color:var(--blue);}

/* error */
.err-msg{display:none;align-items:center;gap:7px;padding:9px 12px;background:var(--red-lo);border:1px solid #fca5a5;border-radius:7px;font-size:11.5px;color:#b91c1c;margin-bottom:14px;}
.err-msg.show{display:flex;}

/* login btn */
.btn-login{width:100%;height:40px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13.5px;font-weight:700;font-family:var(--font);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;transition:background .15s,box-shadow .15s,transform .1s;}
.btn-login:hover{background:#1d4ed8;box-shadow:0 4px 14px rgba(37,99,235,.35);}
.btn-login:active{transform:translateY(1px);}
.btn-login:disabled{background:var(--slate2);cursor:not-allowed;}

/* footer */
.card-ft{padding:12px 32px;border-top:1px solid var(--border);background:var(--surf2);display:flex;align-items:center;justify-content:space-between;}
.ft-dot{display:flex;align-items:center;gap:6px;font-size:10.5px;color:var(--slate2);}
.dot-g{width:6px;height:6px;background:var(--green);border-radius:50%;box-shadow:0 0 5px var(--green);animation:blink 2.4s ease infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ft-r{font-size:10px;color:var(--slate3);font-family:var(--mono);}

/* success overlay */
.s-overlay{display:none;position:fixed;inset:0;background:rgba(241,245,249,.92);backdrop-filter:blur(6px);z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
.s-overlay.show{display:flex;}
.s-check{width:56px;height:56px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:26px;color:#fff;box-shadow:0 0 32px rgba(22,163,74,.45);animation:popIn .4s cubic-bezier(.22,1,.36,1);}
@keyframes popIn{from{transform:scale(.6);opacity:0}to{transform:scale(1);opacity:1}}
.s-txt{font-size:14px;font-weight:700;color:var(--green);font-family:var(--mono);}
.s-sub{font-size:11.5px;color:var(--slate);}

/* spin */
.spin{display:inline-block;width:13px;height:13px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="s-overlay" id="s-overlay">
  <div class="s-check">✓</div>
  <div class="s-txt">인증 완료</div>
  <div class="s-sub">에이전트를 불러오는 중입니다...</div>
</div>

<div class="app">
  <div class="topbar">
    <div class="tb-title">DC 물건 분석 에이전트</div>
    <div class="tb-badge">안산 권역 · D단계</div>
    <div class="tb-spacer"></div>
    <div class="tb-ver">v2.0 · DBO</div>
  </div>

  <div class="body-wrap">
    <div class="card">
      <div class="card-hd">
        <div class="logo-row">
          <div class="logo-icon">🏗</div>
          <div class="logo-txt">LG U+ · DBO 사업팀</div>
        </div>
        <div class="card-title">DC 물건 분석 에이전트</div>
        <div class="card-sub">Data Center · <span>D단계 투자 검토 시스템</span></div>
      </div>

      <div class="card-bd">
        <div class="info-banner">
          <span>🔐</span>
          <span>DBO 사업팀 내부 전용 시스템입니다. 접근 코드를 입력하세요.</span>
        </div>

        <label class="field-label" for="pw-inp">접근 코드</label>
        <div class="inp-wrap">
          <span class="inp-ico">🔑</span>
          <input class="pw-inp" type="password" id="pw-inp"
            placeholder="접근 코드 입력"
            autocomplete="off"
            onkeydown="if(event.key==='Enter') doLogin()">
          <button class="toggle-btn" onclick="togglePw()" title="표시/숨김">👁</button>
        </div>

        <div class="err-msg" id="err-msg">
          <span>⛔</span><span id="err-txt">접근 코드가 올바르지 않습니다.</span>
        </div>

        <button class="btn-login" id="btn-login" onclick="doLogin()">
          <span id="btn-ico">▶</span>
          <span id="btn-lbl">에이전트 시작</span>
        </button>
      </div>

      <div class="card-ft">
        <div class="ft-dot">
          <div class="dot-g"></div>
          <span>DBO 사업팀 전용 시스템</span>
        </div>
        <div class="ft-r">INTERNAL USE ONLY</div>
      </div>
    </div>
  </div>
</div>

<script>
// SHA-256(dbo@0409)
const PW_HASH = 'c2320fbfbfc56a6c8676844f832b0fda68566f0a025caf395ca627429ee31f2b';

async function sha256(msg) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(msg));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  var val  = document.getElementById('pw-inp').value;
  var btn  = document.getElementById('btn-login');
  var ico  = document.getElementById('btn-ico');
  var lbl  = document.getElementById('btn-lbl');
  var err  = document.getElementById('err-msg');

  if (!val) { showErr('접근 코드를 입력하세요.'); return; }

  btn.disabled=true;
  ico.innerHTML='<span class="spin"></span>';
  lbl.textContent='확인 중...';
  err.classList.remove('show');

  try {
    var hash = await sha256(val);
    if (hash === PW_HASH) {
      document.getElementById('s-overlay').classList.add('show');
      setTimeout(function(){ window.location.href='dc_agent_ansan_v3_71.html'; }, 1200);
    } else {
      btn.disabled=false;
      ico.textContent='▶';
      lbl.textContent='에이전트 시작';
      document.getElementById('pw-inp').value='';
      document.getElementById('pw-inp').focus();
      showErr('접근 코드가 올바르지 않습니다.');
    }
  } catch(e) {
    btn.disabled=false;
    ico.textContent='▶';
    lbl.textContent='에이전트 시작';
    showErr('오류가 발생했습니다. 다시 시도하세요.');
  }
}

function showErr(msg) {
  var err=document.getElementById('err-msg');
  var txt=document.getElementById('err-txt');
  txt.textContent=msg;
  err.classList.remove('show');
  void err.offsetWidth;
  err.classList.add('show');
  var inp=document.getElementById('pw-inp');
  inp.classList.add('err');
  setTimeout(function(){ inp.classList.remove('err'); },600);
}

function togglePw() {
  var inp=document.getElementById('pw-inp');
  inp.type=inp.type==='password'?'text':'password';
}

window.addEventListener('load', function(){ document.getElementById('pw-inp').focus(); });
</script>
</body>
</html>
